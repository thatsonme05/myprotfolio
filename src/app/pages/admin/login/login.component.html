<div class="login-page">
  <div class="login-left">
    <div class="brand">
      <div class="logo-mark">M</div>
      <div>
        <div class="logo-text">MOH MAULIDIN MAHDI</div>
        <div class="logo-sub">Admin Portal</div>
      </div>
    </div>
    <div class="left-content">
      <h1>Kelola<br><em>Portfolio</em><br>Anda</h1>
      <p>Upload screenshot project, tambah pengalaman baru, dan jaga portofolio Anda tetap up to date.</p>
    </div>
    <div class="left-grid">
      <div class="grid-cell" *ngFor="let n of [1,2,3,4,5,6,7,8,9]"></div>
    </div>
  </div>

  <div class="login-right">
    <a routerLink="/" class="back-link">← Kembali ke Site</a>

    <div class="login-box">
      <div class="login-header">
        <span class="login-tag">Admin Access</span>
        <h2>Sign In</h2>
        <p>Masukkan kredensial untuk mengelola portfolio</p>
      </div>
      <form (ngSubmit)="login()" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="Username" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="password" [type]="showPassword ? 'text' : 'password'"
                   [(ngModel)]="password" name="password" placeholder="Password" autocomplete="current-password" />
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error }}
        </div>

        <button type="submit" class="login-btn" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Masuk →</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>
    </div>
  </div>
</div>
